<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Search &amp; Transcription Agent</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="alternate icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <script src="config.js"></script>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #14171b;
      --line: #262b31;
      --text: #e7e9ec;
      --dim: #7d868f;
      --accent: #ffb454;
      --accent-dim: #6b5330;
      --ok: #6fd88a;
      --err: #ef6f6c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "IBM Plex Mono", Menlo, Consolas, monospace;
      min-height: 100vh;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0;
    }

    h1 span {
      color: var(--accent);
    }

    .tagline {
      color: var(--dim);
      font-size: 13px;
      margin: 0 0 32px;
    }

    .query-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 12px 14px;
      font-family: inherit;
      font-size: 14px;
      border-radius: 6px;
      outline: none;
    }

    input[type="text"]:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    input[type="text"]::placeholder {
      color: #4d545c;
    }

    button {
      background: var(--accent);
      color: #1a1305;
      border: none;
      padding: 0 20px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover {
      opacity: 0.85;
    }

    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    button:disabled {
      background: var(--line);
      color: var(--dim);
      cursor: default;
    }

    button.ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 500;
    }

    button.ghost:hover {
      opacity: 1;
      border-color: var(--dim);
    }

    .pipeline {
      display: none;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      margin-bottom: 24px;
    }

    .pipeline.visible {
      display: flex;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .step:last-child {
      border-bottom: none;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #3a4048;
      margin-top: 5px;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .step.pending .dot {
      background: #3a4048;
    }

    .step.active .dot {
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-dim);
      animation: pulse 1.1s ease-in-out infinite;
    }

    .step.done .dot {
      background: var(--ok);
    }

    .step.failed .dot {
      background: var(--err);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.45;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .step.active .dot {
        animation: none;
        opacity: 1;
      }
    }

    .step-body {
      flex: 1;
      min-width: 0;
    }

    .step-name {
      font-size: 13px;
      font-weight: 600;
    }

    .step.pending .step-name {
      color: var(--dim);
    }

    .step-detail {
      font-size: 12.5px;
      color: var(--dim);
      margin-top: 3px;
      word-break: break-word;
    }

    .step.failed .step-detail {
      color: var(--err);
    }

    .result {
      display: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .result.visible {
      display: block;
    }

    .thumb-row {
      display: flex;
      gap: 14px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    /* 16:9 wrapper — holds either the static thumbnail + play overlay,
     or (after clicking) the live YouTube iframe embed. */
    .thumb-wrap {
      position: relative;
      width: 120px;
      height: 68px;
      border-radius: 5px;
      overflow: hidden;
      background: var(--bg);
      flex-shrink: 0;
      cursor: pointer;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-wrap iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .thumb-row.playing {
      flex-direction: column;
    }

    .thumb-row.playing .thumb-wrap {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      cursor: default;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.25);
      border: none;
      padding: 0;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    .play-overlay::after {
      content: "";
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 8px 0 8px 13px;
      border-color: transparent transparent transparent #fff;
      margin-left: 2px;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.5));
    }

    .play-overlay:hover {
      background: rgba(0, 0, 0, 0.4);
    }

    .thumb-text {
      min-width: 0;
    }

    .thumb-text h2 {
      font-size: 14px;
      margin: 0 0 4px;
      line-height: 1.35;
    }

    .thumb-text .meta {
      color: var(--dim);
      font-size: 12.5px;
    }

    .result-body {
      padding: 16px;
    }

    .transcript-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .transcript-head span {
      font-size: 11.5px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .transcript-actions {
      display: flex;
      gap: 6px;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--dim);
      font-family: inherit;
      font-size: 11.5px;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    .copy-btn:hover {
      color: var(--text);
      border-color: var(--dim);
    }

    .transcript {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.6;
      color: #d3d6da;
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .path {
      margin-top: 12px;
      font-size: 11.5px;
      color: var(--dim);
    }

    .result-actions {
      margin-top: 16px;
    }

    .error-banner {
      display: none;
      border: 1px solid #4a2b2a;
      background: #1e1211;
      color: var(--err);
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .error-banner.visible {
      display: block;
    }

    @media (max-width: 480px) {
      .query-row {
        flex-direction: column;
      }

      .thumb-row {
        flex-direction: column;
      }

      .thumb-wrap {
        width: 100%;
        height: auto;
        aspect-ratio: 16/9;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>
        <svg width="18" height="18" viewBox="0 0 64 64" style="vertical-align: -3px; margin-right: 8px;">
          <rect width="64" height="64" rx="16" fill="#ffb454" />
          <path d="M24 17 L48 32 L24 47 Z" fill="#14171b" />
        </svg>
        Video Search &amp; <span>Transcription</span> Agent
      </h1>
    </header>
    <p class="tagline">search → extract → transcribe → save, on autopilot</p>

    <div class="query-row">
      <input id="queryInput" type="text" placeholder="e.g. explain transformers in 5 minutes" autocomplete="off" />
      <button id="runBtn">Run</button>
    </div>

    <div class="pipeline" id="pipeline" role="status" aria-live="polite">
      <div class="step pending" data-step="search">
        <div class="dot"></div>
        <div class="step-body">
          <div class="step-name">1. Search YouTube</div>
          <div class="step-detail">Waiting to start…</div>
        </div>
      </div>
      <div class="step pending" data-step="extract">
        <div class="dot"></div>
        <div class="step-body">
          <div class="step-name">2. Extract audio</div>
          <div class="step-detail">Waiting to start…</div>
        </div>
      </div>
      <div class="step pending" data-step="transcribe">
        <div class="dot"></div>
        <div class="step-body">
          <div class="step-name">3. Transcribe (Groq Whisper)</div>
          <div class="step-detail">Waiting to start…</div>
        </div>
      </div>
      <div class="step pending" data-step="save">
        <div class="dot"></div>
        <div class="step-body">
          <div class="step-name">4. Save to knowledge base</div>
          <div class="step-detail">Waiting to start…</div>
        </div>
      </div>
    </div>

    <div class="error-banner" id="errorBanner" role="alert"></div>

    <div class="result" id="result">
      <div class="thumb-row" id="thumbRow">
        <div class="thumb-wrap" id="thumbWrap">
          <img id="resultThumb" alt="" />
          <button class="play-overlay" id="playOverlay" aria-label="Play video"></button>
        </div>
        <div class="thumb-text">
          <h2 id="resultTitle"></h2>
          <div class="meta" id="resultMeta"></div>
        </div>
      </div>
      <div class="result-body">
        <div class="transcript-head">
          <span>Transcript preview</span>
          <div class="transcript-actions">
            <button class="copy-btn" id="toggleBtn">Show full</button>
            <button class="copy-btn" id="copyBtn">Copy</button>
          </div>
        </div>
        <div class="transcript" id="resultTranscript"></div>
        <div class="path" id="resultPath"></div>
        <div class="result-actions">
          <button class="ghost" id="resetBtn">New search</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
